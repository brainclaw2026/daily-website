name: ingest

on:
  # Runs every day at 08:00 / 12:00 / 16:00 / 20:00 Asia/Shanghai
  # UTC: 00:00 / 04:00 / 08:00 / 12:00
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 4 * * *'
    - cron: '0 8 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workspaces/fullstack-dev-assistant
    steps:
      - uses: actions/checkout@v4

      - name: Show trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "actor=${{ github.actor }}"
          echo "repository=${{ github.repository }}"
          echo "run_id=${{ github.run_id }}"
          echo "run_number=${{ github.run_number }}"
          echo "workflow=${{ github.workflow }}"
          echo "server_time_utc=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "server_time_shanghai=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: Show checked out revision
        run: |
          git status --short --branch
          git log --oneline -n 3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workspaces/fullstack-dev-assistant/package-lock.json

      - name: Install dependencies
        run: |
          echo "install_started_utc=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          npm ci
          echo "install_finished_utc=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Run ingest
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          INGEST_LOOKBACK_DAYS: ${{ secrets.INGEST_LOOKBACK_DAYS }}
          INGEST_MAX_ITEMS_PER_SOURCE: ${{ secrets.INGEST_MAX_ITEMS_PER_SOURCE }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -o pipefail
          npm run ingest | tee ingest-output.log

          echo ""
          echo "--- ingest summary ---"
          grep 'INGEST_SUMMARY' ingest-output.log || true

          if grep -q 'INGEST_FAILED_SOURCES' ingest-output.log; then
            echo ""
            echo "--- failed sources ---"
            sed -n '/INGEST_FAILED_SOURCES/,$p' ingest-output.log
          fi

      - name: Show content diff status
        run: |
          echo ""
          echo "--- git status ---"
          git status --short
          echo ""
          echo "--- data diff stat ---"
          git diff --stat -- data/content-items.json || true
          echo ""
          echo "--- data diff preview ---"
          git diff -- data/content-items.json | sed -n '1,200p' || true

      - name: Commit updated content data
        run: |
          if git diff --quiet -- data/content-items.json; then
            echo "No content changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/content-items.json
          git commit -m "chore: update ingested content"
          echo "push_started_utc=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
          echo "push_finished_utc=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Final job summary
        if: always()
        run: |
          echo ""
          echo "--- final git status ---"
          git status --short --branch
          echo ""
          echo "--- final latest commit ---"
          git log --oneline -n 1
          echo ""
          echo "job_finished_utc=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "job_finished_shanghai=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S %Z')"
