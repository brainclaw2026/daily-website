name: ingest

on:
  # Regular run: every day at 13:00 Asia/Shanghai (05:00 UTC)
  # Temporary verification run: every day at 13:45 Asia/Shanghai (05:45 UTC)
  schedule:
    - cron: '0 5 * * *'
    - cron: '45 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workspaces/fullstack-dev-assistant
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workspaces/fullstack-dev-assistant/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ingest
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          INGEST_LOOKBACK_DAYS: ${{ secrets.INGEST_LOOKBACK_DAYS }}
          INGEST_MAX_ITEMS_PER_SOURCE: ${{ secrets.INGEST_MAX_ITEMS_PER_SOURCE }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -o pipefail
          npm run ingest | tee ingest-output.log

          echo ""
          echo "--- ingest summary ---"
          grep 'INGEST_SUMMARY' ingest-output.log || true

          if grep -q 'INGEST_FAILED_SOURCES' ingest-output.log; then
            echo ""
            echo "--- failed sources ---"
            sed -n '/INGEST_FAILED_SOURCES/,$p' ingest-output.log
          fi

      - name: Show content diff status
        run: |
          echo ""
          echo "--- git status ---"
          git status --short
          echo ""
          echo "--- data diff stat ---"
          git diff --stat -- data/content-items.json || true

      - name: Commit updated content data
        run: |
          if git diff --quiet -- data/content-items.json; then
            echo "No content changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/content-items.json
          git commit -m "chore: update ingested content"
          git push
